# lefthook 設定: コミット/プッシュ時にコード品質を自動チェックする
# 参考: https://lefthook.dev/

pre-commit:
  # 拡張子ごとにジョブを分け（glob は重複なし）、各ジョブ内は逐次実行する。
  # → 同一ファイルを複数ツールが並列に書き換える競合を構造的に排除する。
  # Markdown は規約上どのツールの整形対象でもないため対象外。
  parallel: true
  jobs:
    # TS/JS: 整形 → 静的解析 の順
    # Convex 生成コードは対象外（exclude）。除外の結果ファイルが空になっても
    # lefthook はジョブを実行するため、空ガードで oxlint の空入力エラーを防ぐ。
    # {staged_files} は複数ファイルで複数引数に展開されるため、直接 [ -n ... ] に
    # 渡さず sh の位置引数として受けて "$@" で扱う（#113）。
    - name: js
      glob: "*.{ts,tsx,js,jsx}"
      exclude: "convex/_generated/"
      run: >-
        sh -c 'if [ -n "$*" ]; then
        bunx oxfmt --write --no-error-on-unmatched-pattern "$@" &&
        bunx oxlint --fix "$@"; fi' _ {staged_files}
      stage_fixed: true

    # CSS: lint(stylelint) → 整形(oxfmt) の順
    - name: css
      glob: "*.{css,scss}"
      run: >-
        bunx stylelint --fix --allow-empty-input {staged_files} &&
        bunx oxfmt --write --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true

    # その他データ系（json/yaml）: 整形のみ
    - name: data
      glob: "*.{json,jsonc,yaml,yml}"
      run: bunx oxfmt --write --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true

commit-msg:
  jobs:
    # Conventional Commits 準拠をチェック
    - name: commitlint
      run: bunx commitlint --edit {1}

pre-push:
  parallel: false
  jobs:
    # プッシュ前にプロジェクト全体の型検査とテストを実行
    - name: typecheck
      run: bun run typecheck
    - name: test
      run: bun run test:run
